
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/chatbot
    depends_on:
      - redis
      - postgres
    volumes:
      - ./chroma_db:/app/chroma_db  # persist vector DB

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # persist DB data

volumes:
  postgres_data: